services:
  - name: skore-manager-web
    type: web
    runtime: static
    buildCommand: npm install && npm run build:web
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: VITE_COLLABORATORS_API_URL
        value: https://meu-backend-2p74.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
